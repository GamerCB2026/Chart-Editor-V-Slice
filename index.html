<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FNF Studio - Sync Master</title>
    <style>
        :root { --accent: #00ffcc; --bg: #0a0a0a; --grid-line: #222; }
        body { background: var(--bg); color: #eee; font-family: sans-serif; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        
        /* Selector de Modo */
        #mode-selector { position: fixed; top: 10px; right: 10px; z-index: 1000; display: flex; gap: 5px; background: #222; padding: 5px; border-radius: 8px; }
        .mode-btn { padding: 8px; cursor: pointer; border: 1px solid #444; background: #111; border-radius: 5px; font-size: 20px; }
        .mode-btn.active { border-color: var(--accent); background: #333; }

        /* Controles */
        #sidebar { width: 300px; padding: 20px; background: #151515; border-right: 2px solid #333; z-index: 100; overflow-y: auto; transition: 0.3s; }
        
        /* AREA DE CHART Y REJILLA */
        #chart-area { flex-grow: 1; height: 100vh; overflow-y: scroll; background: #050505; position: relative; display: none; }
        
        #grid { 
            display: grid; margin: 0 auto;
            /* Cuadros visibles siempre */
            background-size: 60px 60px;
            background-image: 
                linear-gradient(to right, var(--grid-line) 2px, transparent 2px),
                linear-gradient(to bottom, var(--grid-line) 2px, transparent 2px);
            border-left: 2px solid #444; border-right: 2px solid #444; position: relative;
        }

        #playhead {
            position: absolute; width: 100%; height: 6px; background: #ff0000;
            box-shadow: 0 0 10px #ff0000; left: 0; z-index: 60; cursor: ns-resize;
        }

        .note { width: 60px; height: 60px; cursor: pointer; background-size: 80%; background-repeat: no-repeat; background-position: center; opacity: 0.1; border: 0.1px solid #111; }
        .active-note { opacity: 1 !important; filter: drop-shadow(0 0 5px currentColor); }

        /* Iconos */
        .col-0, .col-4 { background-image: url('https://raw.githubusercontent.com/GamerCB2026/Chart-Editor-V-Slice/main/169%20sin%20título_20260414162712.png'); }
        .col-1, .col-5 { background-image: url('https://raw.githubusercontent.com/GamerCB2026/Chart-Editor-V-Slice/main/169%20sin%20título_20260414162644.png'); }
        .col-2, .col-6 { background-image: url('https://raw.githubusercontent.com/GamerCB2026/Chart-Editor-V-Slice/main/169%20sin%20título_20260414162622.png'); }
        .col-3, .col-7 { background-image: url('https://raw.githubusercontent.com/GamerCB2026/Chart-Editor-V-Slice/main/169%20sin%20título_20260414162552.png'); }

        /* Adaptación Móvil */
        body.mobile-mode #sidebar { position: fixed; bottom: 0; width: 100%; height: 45vh; border-top: 2px solid var(--accent); transform: translateY(100%); z-index: 900; }
        body.mobile-mode #sidebar.show { transform: translateY(0); }
        body.mobile-mode .note { width: 80px; height: 80px; }
        body.mobile-mode #grid { background-size: 80px 80px; }

        #mobile-nav { display: none; position: fixed; top: 10px; left: 10px; z-index: 500; gap: 8px; }
        body.mobile-mode #mobile-nav { display: flex; }
        
        .m-btn { padding: 12px; background: #222; border: 1px solid var(--accent); color: #fff; border-radius: 8px; font-weight: bold; }
        .active-side { background: var(--accent); color: #000; }
        button { width: 100%; padding: 12px; margin-top: 8px; cursor: pointer; background: #222; color: var(--accent); border: 1px solid var(--accent); border-radius: 4px; }
    </style>
</head>
<body class="pc-mode">

<div id="mode-selector">
    <div class="mode-btn active" onclick="changeMode('pc')">💻</div>
    <div class="mode-btn" onclick="changeMode('mobile')">📱</div>
</div>

<div id="mobile-nav">
    <button class="m-btn active-side" id="m-opp" onclick="setSide(0)">OPONENTE</button>
    <button class="m-btn" id="m-bf" onclick="setSide(1)">JUGADOR</button>
    <button class="m-btn" onclick="document.getElementById('sidebar').classList.toggle('show')">⚙️</button>
</div>

<div id="sidebar">
    <h2 style="color:var(--accent); margin:0;">FNF STUDIO</h2>
    <label style="font-size:12px;">BPM:</label>
    <input type="number" id="bpm" value="100" style="width:100%; background:#222; color:#fff; border:1px solid var(--accent); padding:8px;">
    
    <p style="color:var(--accent); font-weight:bold; margin-top:15px;">AUDIOS</p>
    <input type="file" id="f-inst" accept="audio/*"> <small>Inst</small>
    <input type="file" id="f-opp" accept="audio/*"> <small>Voces Oponente</small>
    <input type="file" id="f-bf" accept="audio/*"> <small>Voces Jugador</small>
    
    <button onclick="buildGrid()" style="background:var(--accent); color:#000; margin-top:15px;">GENERAR ÁREA</button>
    <button id="playBtn" onclick="toggleMusic()" disabled>REPRODUCIR (SPACE)</button>
    <button onclick="resetToStart()" style="color:#ff4444; border-color:#ff4444;">RESET</button>
</div>

<div id="chart-area">
    <div id="grid"><div id="playhead"></div></div>
</div>

<script>
    let appMode = 'pc', activeSide = 0;
    const audio = { inst: new Audio(), opp: new Audio(), bf: new Audio() };
    let playing = false, dragging = false;

    // --- SISTEMA DE SINCRONIZACIÓN MAESTRA ---
    function syncAudios() {
        // Obligamos a las voces a tener el mismo tiempo que la instrumental
        if (Math.abs(audio.opp.currentTime - audio.inst.currentTime) > 0.05) {
            audio.opp.currentTime = audio.inst.currentTime;
        }
        if (Math.abs(audio.bf.currentTime - audio.inst.currentTime) > 0.05) {
            audio.bf.currentTime = audio.inst.currentTime;
        }
    }

    function changeMode(m) {
        appMode = m;
        document.body.className = m + '-mode';
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
        if(m === 'pc') { document.getElementById('sidebar').classList.remove('show'); updateLayout(true); }
        else { setSide(0); }
    }

    function setSide(s) {
        activeSide = s;
        document.getElementById('m-opp').classList.toggle('active-side', s === 0);
        document.getElementById('m-bf').classList.toggle('active-side', s === 1);
        updateLayout(false);
    }

    function updateLayout(showAll) {
        const notes = document.querySelectorAll('.note');
        const grid = document.getElementById('grid');
        const size = appMode === 'pc' ? 60 : 80;
        
        notes.forEach(n => {
            const c = parseInt(n.dataset.col);
            if(showAll) n.style.display = 'block';
            else n.style.display = (activeSide === 0 && c < 4) || (activeSide === 1 && c >= 4) ? 'block' : 'none';
        });
        
        grid.style.gridTemplateColumns = showAll ? `repeat(8, ${size}px)` : `repeat(4, ${size}px)`;
        grid.style.width = showAll ? `${size * 8}px` : `${size * 4}px`;
    }

    function buildGrid() {
        const grid = document.getElementById('grid');
        const ph = document.getElementById('playhead');
        grid.innerHTML = ''; grid.appendChild(ph);
        
        const bpm = parseInt(document.getElementById('bpm').value);
        const rows = Math.ceil((audio.inst.duration * 1000) / ((60000/bpm)/4));
        
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < 8; c++) {
                const n = document.createElement('div');
                n.className = `note col-${c}`;
                n.dataset.row = r; n.dataset.col = c;
                n.onclick = () => n.classList.toggle('active-note');
                grid.appendChild(n);
            }
        }
        document.getElementById('chart-area').style.display = 'block';
        document.getElementById('playBtn').disabled = false;
        updateLayout(appMode === 'pc');
    }

    function toggleMusic() {
        if (!playing) {
            audio.inst.play(); audio.opp.play(); audio.bf.play();
            playing = true; renderLoop();
        } else {
            audio.inst.pause(); audio.opp.pause(); audio.bf.pause();
            playing = false;
        }
    }

    function renderLoop() {
        if(!playing || dragging) return;
        syncAudios(); // Ejecutar sincronización
        const bpm = parseInt(document.getElementById('bpm').value);
        const h = appMode === 'pc' ? 60 : 80;
        const pos = (audio.inst.currentTime * 1000 / ((60000/bpm)/4)) * h;
        
        document.getElementById('playhead').style.top = pos + 'px';
        document.getElementById('chart-area').scrollTop = pos - 200;
        requestAnimationFrame(renderLoop);
    }

    // --- Arrastre de Línea Roja ---
    const ph = document.getElementById('playhead');
    function seek(y) {
        const rect = document.getElementById('grid').getBoundingClientRect();
        const scroll = document.getElementById('chart-area').scrollTop;
        const h = appMode === 'pc' ? 60 : 80;
        const time = (((y - rect.top + scroll) / h) * ((60000/parseInt(document.getElementById('bpm').value))/4)) / 1000;
        if(time >= 0 && time <= audio.inst.duration) {
            audio.inst.currentTime = audio.opp.currentTime = audio.bf.currentTime = time;
            document.getElementById('playhead').style.top = (y - rect.top + scroll) + 'px';
        }
    }

    ph.onmousedown = ph.ontouchstart = () => dragging = true;
    window.onmousemove = (e) => { if(dragging) seek(e.clientY); };
    window.ontouchmove = (e) => { if(dragging) seek(e.touches[0].clientY); };
    window.onmouseup = window.ontouchend = () => dragging = false;

    function resetToStart() { audio.inst.currentTime = 0; renderLoop(); }

    function load(id, key) { document.getElementById(id).onchange = (e) => audio[key].src = URL.createObjectURL(e.target.files[0]); }
    load('f-inst', 'inst'); load('f-opp', 'opp'); load('f-bf', 'bf');
</script>
</body>
</html>
