<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FNF Studio - V-Slice Editor</title>
    <style>
        body { background: #0a0a0a; color: #eee; font-family: sans-serif; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        #sidebar { width: 300px; padding: 20px; background: #151515; border-right: 2px solid #333; z-index: 100; overflow-y: auto; }
        #chart-area { flex-grow: 1; height: 100vh; overflow-y: scroll; background: #050505; position: relative; display: none; }
        
        #grid { 
            display: grid; grid-template-columns: repeat(8, 60px); width: 480px; margin: 0 auto;
            background-color: #080808;
            background-image: linear-gradient(to right, #222 1px, transparent 1px), linear-gradient(to bottom, #222 1px, transparent 1px);
            background-size: 60px 60px; border-left: 2px solid #444; border-right: 2px solid #444; position: relative;
        }

        #playhead {
            position: absolute; width: 480px; height: 6px; background: #ff0000;
            box-shadow: 0 0 20px #ff0000; left: 50%; transform: translateX(-50%);
            z-index: 50; pointer-events: none;
        }

        .note { 
            width: 60px; height: 60px; cursor: pointer; 
            background-size: 85%; background-repeat: no-repeat; background-position: center; 
            opacity: 0;
            transition: opacity 0.1s;
        }
        
        .active-note { opacity: 1 !important; }

        /* RUTAS DE GITHUB - Cambia los nombres de archivo si son diferentes en tu repo */
        /* Izquierda (Morada) */
        .col-0, .col-4 { background-image: url('https://raw.githubusercontent.com/GamerCB2026/Chart-Editor-V-Slice/main/169%20sin%20título_20260414162712.png'); }
        /* Abajo (Azul) */
        .col-1, .col-5 { background-image: url('https://raw.githubusercontent.com/GamerCB2026/Chart-Editor-V-Slice/main/169%20sin%20título_20260414162644.png'); }
        /* Arriba (Verde) */
        .col-2, .col-6 { background-image: url('https://raw.githubusercontent.com/GamerCB2026/Chart-Editor-V-Slice/main/169%20sin%20título_20260414162622.png'); }
        /* Derecha (Roja) */
        .col-3, .col-7 { background-image: url('https://raw.githubusercontent.com/GamerCB2026/Chart-Editor-V-Slice/main/169%20sin%20título_20260414162552.png'); }

        .note:hover:not(.active-note) { opacity: 0.3; background-color: rgba(255,255,255,0.1); }

        button { width: 100%; padding: 12px; margin-top: 10px; cursor: pointer; background: #222; color: #00ffcc; border: 1px solid #00ffcc; border-radius: 5px; font-weight: bold; }
        button:hover { background: #00ffcc; color: #000; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2 style="color: #00ffcc; text-align: center;">FNF STUDIO</h2>
        <label>BPM: <input type="number" id="bpm" value="100" style="width: 60px;"></label>
        <div style="font-size: 11px; margin-top: 10px;">
            Inst: <input type="file" id="inst-file" accept="audio/*"><br>
            Voces: <input type="file" id="opp-file" accept="audio/*">
        </div>
        <button onclick="generateChartArea()">GENERAR ÁREA</button>
        <button id="playBtn" onclick="togglePlay()" disabled>REPRODUCIR (SPACE)</button>
        <button onclick="exportChart()">EXPORTAR JSON</button>
    </div>

    <div id="chart-area" onscroll="handleManualScroll()">
        <div id="playhead"></div>
        <div id="grid"></div>
    </div>

<script>
    // Usa el mismo script de la respuesta anterior
    // La lógica de sonido (Tick) y Scroll se mantiene intacta
</script>
</body>
</html>
